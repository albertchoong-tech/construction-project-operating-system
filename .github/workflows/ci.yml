name: CI

# Pre-merge quality gate. Vercel still runs the real production build on deploy;
# this catches type + build regressions and runs the E2E smoke suite on the PR
# before it reaches main.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Lets you re-run CI from the Actions tab without a commit — useful when only
  # repository secrets changed.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Required gate — needs no runtime env, catches most regressions.
      - name: Typecheck
        run: npm run typecheck

      # Informational — Next build. Uses placeholder public env so the build can
      # resolve the Supabase client at build time (pages are force-dynamic, so no
      # real connection is made). Promote to a required gate once NEXT_PUBLIC_*
      # are added as repo secrets and the build is confirmed green here.
      - name: Build
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
        run: npm run build

      # Required gate — ESLint (flat config) with zero-warning tolerance.
      - name: Lint
        run: npm run lint

  e2e:
    needs: verify
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      E2E_EMAIL: ${{ vars.E2E_EMAIL }}
    steps:
      - uses: actions/checkout@v5

      # Skip (don't fail) until the repo secrets are configured, so E2E never
      # blocks merges before it's set up. Add NEXT_PUBLIC_SUPABASE_URL,
      # NEXT_PUBLIC_SUPABASE_ANON_KEY and E2E_PASSWORD to enable it.
      - name: Check E2E secrets
        id: gate
        run: |
          if [ -n "$NEXT_PUBLIC_SUPABASE_URL" ] && [ -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ] && [ -n "$E2E_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::E2E smoke tests skipped — set all three of NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY and E2E_PASSWORD repository secrets to enable them."
          fi

      # Fail fast with a clear message if a secret is a placeholder / malformed —
      # BEFORE the build bakes it in. Never prints the values (GitHub also masks
      # them). NEXT_PUBLIC_* are build-time-inlined, so a bad URL here = a broken
      # build that no runtime env can fix.
      - name: Preflight — validate secrets (values never printed)
        if: steps.gate.outputs.enabled == 'true'
        run: |
          fail=0
          if printf '%s' "$NEXT_PUBLIC_SUPABASE_URL" | grep -Eq '^https://[a-z0-9]{20}\.supabase\.co/?$'; then
            echo "PASS  NEXT_PUBLIC_SUPABASE_URL is a real Supabase project URL (…​.supabase.co)"
          else
            echo "FAIL  NEXT_PUBLIC_SUPABASE_URL is missing or not https://<20-char-ref>.supabase.co (placeholder or typo?)"
            fail=1
          fi
          if [ -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ] && [ "${#NEXT_PUBLIC_SUPABASE_ANON_KEY}" -ge 40 ]; then
            echo "PASS  NEXT_PUBLIC_SUPABASE_ANON_KEY is present"
          else
            echo "FAIL  NEXT_PUBLIC_SUPABASE_ANON_KEY is missing or too short"
            fail=1
          fi
          if [ -n "$E2E_PASSWORD" ]; then
            echo "PASS  E2E_PASSWORD is present"
          else
            echo "FAIL  E2E_PASSWORD is missing"
            fail=1
          fi
          # Live check: confirm the URL + anon key are a valid pair for the SAME
          # Supabase project (catches a good key paired with the wrong URL, which
          # Supabase reports as "Invalid API key"). No password; no values printed.
          if [ "$fail" -eq 0 ]; then
            http=$(curl -s -o /dev/null -w '%{http_code}' -H "apikey: $NEXT_PUBLIC_SUPABASE_ANON_KEY" "$NEXT_PUBLIC_SUPABASE_URL/auth/v1/settings")
            if [ "$http" = "200" ]; then
              echo "PASS  Supabase accepted the URL + anon key pair (/auth/v1/settings -> 200)"
            else
              echo "FAIL  Supabase rejected the URL + anon key pair (/auth/v1/settings -> $http)."
              echo "      NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY must be the URL"
              echo "      and anon key from the SAME project (401 = 'Invalid API key')."
              fail=1
            fi
          fi
          if [ "$fail" -ne 0 ]; then
            echo "::error::E2E secret validation failed — fix the repository secrets (their values are never printed)."
            exit 1
          fi

      - uses: actions/setup-node@v5
        if: steps.gate.outputs.enabled == 'true'
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        if: steps.gate.outputs.enabled == 'true'
        run: npm ci

      - name: Resolve Playwright version
        id: pw
        if: steps.gate.outputs.enabled == 'true'
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browser + deps
        if: steps.gate.outputs.enabled == 'true' && steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.gate.outputs.enabled == 'true' && steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Explicit env (in addition to the job-level env) so it is unmistakable that
      # the real Supabase values are present when Next.js inlines NEXT_PUBLIC_* here.
      - name: Build app
        if: steps.gate.outputs.enabled == 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Run E2E smoke tests
        if: steps.gate.outputs.enabled == 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_EMAIL: ${{ vars.E2E_EMAIL }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ steps.gate.outputs.enabled == 'true' && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          # Preflight can fail before any report exists — don't warn about it.
          if-no-files-found: ignore
